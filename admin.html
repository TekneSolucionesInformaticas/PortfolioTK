<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | TEKNÉ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root { --adm-bg: #05070D; --adm-card: #0B0F1A; --adm-red: #7F1D1D; }
        body { background: var(--adm-bg); font-family: 'Inter'; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .adm-side { width: 320px; background: var(--adm-card); border-right: 1px solid rgba(255,255,255,0.05); padding: 3rem 2rem; display: flex; flex-direction: column; }
        .adm-logo { font-family: 'Space Grotesk'; font-size: 1.5rem; letter-spacing: 0.2em; text-align: center; margin-bottom: 4rem; color: var(--adm-red); }
        .adm-nav-item { padding: 1.25rem; border-radius: 12px; cursor: pointer; color: var(--text-muted); margin-bottom: 0.5rem; transition: 0.3s; font-size: 0.85rem; letter-spacing: 0.1em; }
        .adm-nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .adm-nav-item.active { background: var(--adm-red); color: white; font-weight: 600; box-shadow: 0 10px 20px rgba(127, 29, 29, 0.2); }

        /* Main Area */
        .adm-main { flex: 1; padding: 5rem; overflow-y: auto; background: var(--adm-bg); scroll-behavior: smooth; }
        .adm-section { max-width: 1000px; margin: 0 auto; display: none; }
        .adm-section.active { display: block; }

        /* Cards & Form */
        .adm-card { background: var(--adm-card); padding: 3rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 3rem; position: relative;}
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--adm-red); letter-spacing: 0.2em; margin-bottom: 1rem; margin-top: 2rem; }
        input[type="text"], textarea { width: 100%; background: #000; border: 1px solid rgba(255,255,255,0.1); padding: 1.25rem; color: white; border-radius: 12px; font-size: 1rem; font-family: inherit; }
        textarea { height: 10rem; }

        .img-edit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .img-edit-box { background: #000; border: 1px dashed rgba(255,255,255,0.2); padding: 1rem; border-radius: 15px; text-align: center; }
        .img-edit-box img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; margin-bottom: 1rem; cursor: pointer; }
        .img-edit-box input[type="file"] { display: none; }

        .btn-main { background: var(--adm-red); border: none; padding: 1.5rem 3rem; color: white; border-radius: 50px; font-family: 'Space Grotesk'; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 2rem; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 15px 35px rgba(127, 29, 29, 0.4); }

        .project-row { background: var(--adm-card); padding: 1.5rem 2rem; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; margin-bottom: 1rem; }
        .project-row:hover { border-color: var(--adm-red); }

        .login-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .danger-btn { color: #555; font-size: 0.7rem; background: none; border: none; cursor: pointer; margin-top: 1rem; }
        .danger-btn:hover { color: red; }
    </style>
</head>
<body>

    <div id="loginGate" class="login-box">
        <div class="adm-card" style="width: 400px; text-align: center;">
            <h2 class="adm-logo">TEKNÉ ADMIN</h2>
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-main" onclick="doLogin()">ENTRAR</button>
        </div>
    </div>

    <aside class="adm-side hidden" id="aside">
        <div class="adm-logo">TEKNÉ</div>
        <div class="adm-nav-item active" onclick="nav('home')">INICIO</div>
        <div class="adm-nav-item" onclick="nav('services')">SERVICIOS</div>
        <div class="adm-nav-item" onclick="nav('projects')">PROYECTOS</div>
        
        <div style="margin-top: auto;">
            <button class="btn-main" onclick="saveToStorage()">GUARDAR TODO</button>
            <a href="index.html" style="display: block; text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.8rem;">← Volver al sitio</a>
        </div>
    </aside>

    <main class="adm-main hidden" id="main">
        
        <!-- HOME -->
        <div id="sec-home" class="adm-section active">
            <h1>Portada</h1>
            <div class="adm-card">
                <label>Título Logo</label><input type="text" id="h-title" oninput="db.home.title=this.value">
                <label>Tagline</label><input type="text" id="h-tagline" oninput="db.home.tagline=this.value">
                <label>Subtítulo</label><input type="text" id="h-subtitle" oninput="db.home.subtitle=this.value">
            </div>
        </div>

        <!-- SERVICES -->
        <div id="sec-services" class="adm-section">
            <h1>Servicios</h1>
            <div id="serv-list"></div>
            <button class="adm-nav-item" onclick="addS()">+ AGREGAR SERVICIO</button>
        </div>

        <!-- PROJECTS -->
        <div id="sec-projects" class="adm-section">
            <h1>Proyectos</h1>
            <div id="proj-list-grid"></div>
            <button class="adm-nav-item" onclick="addP()">+ AGREGAR PROYECTO</button>
        </div>

        <!-- PROJECT DETAIL -->
        <div id="sec-p-detail" class="adm-section">
            <button onclick="nav('projects')" style="background: none; border: none; color: var(--adm-red); cursor: pointer; margin-bottom: 2rem;">← VOLVER</button>
            <h1 id="pd-name-head">EDITAR CASO</h1>
            <div class="adm-card">
                <label>Nombre</label><input type="text" id="pd-title" oninput="db.projects[editingP].name=this.value; renderProjs()">
                <label>Categoría</label><input type="text" id="pd-cat" oninput="db.projects[editingP].cat=this.value; renderProjs()">
                
                <h2 style="margin-top: 4rem;">GALERÍA DE IMÁGENES</h2>
                <div class="img-edit-grid" id="pd-gallery"></div>

                <h2 style="margin-top: 4rem;">CONTENIDO</h2>
                <label>Desafío</label><textarea id="pd-challenge" oninput="db.projects[editingP].challenge=this.value"></textarea>
                <label>Solución</label><textarea id="pd-solution" oninput="db.projects[editingP].solution=this.value"></textarea>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div><label>Métrica 1(V)</label><input type="text" id="pd-m1v" oninput="db.projects[editingP].m1[0]=this.value"></div>
                    <div><label>Métrica 1(T)</label><input type="text" id="pd-m1l" oninput="db.projects[editingP].m1[1]=this.value"></div>
                    <div><label>Métrica 2(V)</label><input type="text" id="pd-m2v" oninput="db.projects[editingP].m2[0]=this.value"></div>
                    <div><label>Métrica 2(T)</label><input type="text" id="pd-m2l" oninput="db.projects[editingP].m2[1]=this.value"></div>
                </div>
                <button class="danger-btn" onclick="deleteP()">ELIMINAR ESTE PROYECTO PERMANENTEMENTE</button>
            </div>
        </div>

    </main>

    <script>
        const initialTemplate = { id: "", name: "Nombre Proyecto", cat: "Categoría", imgs: ["img/remitos.png", "img/hero-bg.png", "img/app-movil.png"], captions: ["", "", ""], challenge: "Texto desafío", solution: "Texto solución", m1: ["0", "LBL"], m2: ["0", "LBL"] };
        const defaultData = {
            home: { title: "TEKNÉ", tagline: "SOLUCIONES TECNOLÓGICAS", subtitle: "SOFTWARE EXCLUSIVO PARA EMPRESAS" },
            services: [ { name: "WEB", desc: "...", img: "img/hero-bg.png" } ],
            projects: [ { ...initialTemplate, id: 'remitos', name: 'SISTEMA DE REMITOS' } ]
        };

        let db = JSON.parse(localStorage.getItem('tekne_v3')) || defaultData;
        let editingP = null;

        async function bootstrapData() {
            const localDb = JSON.parse(localStorage.getItem('tekne_v3'));
            if (localDb) {
                db = localDb;
                return;
            }
            try {
                const res = await fetch('data/site-content.json', { cache: 'no-store' });
                if (res.ok) {
                    db = await res.json();
                    return;
                }
            } catch (e) {
                // Ignore and fallback below.
            }
            db = JSON.parse(localStorage.getItem('tekne_v3')) || defaultData;
        }

        async function doLogin() {
            if(document.getElementById('pass').value === 'tekne2026') {
                await bootstrapData();
                document.getElementById('loginGate').remove();
                document.getElementById('aside').classList.remove('hidden');
                document.getElementById('main').classList.remove('hidden');
                syncUI();
            }
        }

        function nav(sec) {
            document.querySelectorAll('.adm-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.adm-nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('sec-' + sec).classList.add('active');
        }

        function syncUI() {
            document.getElementById('h-title').value = db.home.title;
            document.getElementById('h-tagline').value = db.home.tagline;
            document.getElementById('h-subtitle').value = db.home.subtitle;
            renderServs();
            renderProjs();
        }

        function renderServs() {
            const list = document.getElementById('serv-list');
            list.innerHTML = db.services.map((s, i) => `
                <div class="adm-card">
                    <label>Nombre</label><input type="text" value="${s.name}" oninput="db.services[${i}].name=this.value">
                    <label>Img</label>
                    <div class="img-edit-box">
                        <img src="${s.img}" onclick="this.nextElementSibling.click()">
                        <input type="file" onchange="hdlImg(this, (url)=> {db.services[${i}].img=url; renderServs()})">
                    </div>
                </div>
            `).join('');
        }

        function renderProjs() {
            const list = document.getElementById('proj-list-grid');
            list.innerHTML = db.projects.map((p, i) => `
                <div class="project-row" onclick="openP(${i})">
                    <span>${p.name}</span> <span style="color: var(--adm-red);">Editar ↗</span>
                </div>
            `).join('');
        }

        function openP(i) {
            editingP = i;
            const p = db.projects[i];
            nav('p-detail');
            document.getElementById('pd-title').value = p.name;
            document.getElementById('pd-cat').value = p.cat;
            document.getElementById('pd-challenge').value = p.challenge;
            document.getElementById('pd-solution').value = p.solution;
            document.getElementById('pd-m1v').value = p.m1[0];
            document.getElementById('pd-m1l').value = p.m1[1];
            document.getElementById('pd-m2v').value = p.m2[0];
            document.getElementById('pd-m2l').value = p.m2[1];
            
            renderProjGallery();
        }

        function renderProjGallery() {
            const p = db.projects[editingP];
            if (!p.captions) p.captions = p.imgs.map(() => '');
            const gall = document.getElementById('pd-gallery');
            gall.innerHTML = p.imgs.map((url, idx) => `
                <div class="img-edit-box">
                    <label>Imagen ${idx+1}</label>
                    <img src="${url}" onclick="this.nextElementSibling.click()">
                    <input type="file" onchange="hdlImg(this, (res)=> {db.projects[editingP].imgs[${idx}]=res; renderProjGallery()})">
                    <input type="text" placeholder="Descripción de la imagen..." value="${(p.captions[idx]||'').replace(/"/g,'&quot;')}" oninput="if(!db.projects[editingP].captions)db.projects[editingP].captions=[];db.projects[editingP].captions[${idx}]=this.value" style="margin-top:0.75rem;">
                    <button class="danger-btn" onclick="db.projects[editingP].imgs.splice(${idx},1);if(db.projects[editingP].captions)db.projects[editingP].captions.splice(${idx},1);renderProjGallery()">Quitar</button>
                </div>
            `).join('');

            if(p.imgs.length < 10) {
                gall.innerHTML += `<button class="adm-nav-item" style="border: 1px dashed white; grid-column: 1/-1;" onclick="db.projects[editingP].imgs.push('img/hero-bg.png');if(!db.projects[editingP].captions)db.projects[editingP].captions=[];db.projects[editingP].captions.push('');renderProjGallery()">+ AGREGAR IMAGEN AL CASO (${p.imgs.length}/10)</button>`;
            }
        }

        function hdlImg(input, cb) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const MAX = 1200;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > MAX) { h *= MAX/w; w = MAX; } } else { if(h > MAX) { w *= MAX/h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, w, h);
                    cb(canvas.toDataURL("image/jpeg", 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addP() {
            const n = JSON.parse(JSON.stringify(initialTemplate));
            n.id = "p-" + Date.now();
            db.projects.push(n);
            renderProjs();
            openP(db.projects.length - 1);
        }

        function addS() { db.services.push({name:'NUEVO', desc:'', img: 'img/hero-bg.png'}); renderServs(); }
        function deleteP() { if(confirm("¿Seguro?")) { db.projects.splice(editingP, 1); nav('projects'); renderProjs(); } }

        function saveToStorage() {
            try {
                localStorage.setItem('tekne_v3', JSON.stringify(db));
                // Also download JSON for global publish
                const payload = JSON.stringify(db, null, 2);
                const blob = new Blob([payload], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'site-content.json';
                a.click();
                URL.revokeObjectURL(a.href);
                alert("¡Guardado! Se descargó site-content.json → Reemplazalo en data/ del repo y hacé push para que se vea en todos los dispositivos.");
            } catch(e) {
                alert("ERROR: La memoria está llena. Prueba a usar imágenes más pequeñas.");
            }
        }
    </script>
</body>
</html>
